# Preserve any upstream-supplied X-Forwarded-Proto (e.g. from a TLS-terminating
# reverse proxy in front of this container). Fall back to $scheme when absent.
map $http_x_forwarded_proto $forwarded_proto {
    default   $scheme;
    ~.+       $http_x_forwarded_proto;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large multipart uploads (photo uploads, backup ZIPs).
    # Default nginx limit is 1 MB, which rejects most phone photos with 413.
    client_max_body_size 2g;

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location ~ \.mjs$ {
        default_type application/javascript;
        try_files $uri =404;
    }

    # Proxy API and auth to backend
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /auth/ {
        proxy_pass http://api:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
