# Preserve any upstream-supplied X-Forwarded-Proto (e.g. from a TLS-terminating
# reverse proxy in front of this container). Fall back to $scheme when absent.
map $http_x_forwarded_proto $forwarded_proto {
    default   $scheme;
    ~.+       $http_x_forwarded_proto;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow large multipart uploads (backup ZIP imports, brand logo).
    # Default nginx limit is 1 MB, which rejects most uploads with 413.
    client_max_body_size 2g;

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /auth/ {
        proxy_pass http://api:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
