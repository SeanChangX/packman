server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # HTTP Basic Auth covers the entire admin panel
    auth_basic "Packman Admin";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Injected at container startup by entrypoint.sh
        proxy_set_header X-Admin-Auth "__ADMIN_API_SECRET__";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
