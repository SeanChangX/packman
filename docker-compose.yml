services:
  postgres:
    container_name: packman-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: packman
      POSTGRES_PASSWORD: packman
      POSTGRES_DB: packman
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U packman"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    container_name: packman-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-packman}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-packman_secret_change_me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: packman-api
    image: seanchangx/packman-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://packman:packman@postgres:5432/packman?connection_limit=20&pool_timeout=20
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    container_name: packman-web
    image: seanchangx/packman-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

  admin:
    container_name: packman-admin
    image: seanchangx/packman-admin:latest
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
  minio-data:
