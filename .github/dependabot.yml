version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      docker-actions:
        patterns:
          - 'docker/*'
          - 'actions/*'

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directories:
      - /apps/api
      - /apps/web
      - /apps/admin
    schedule:
      interval: weekly
    groups:
      docker-base-images:
        patterns:
          - 'node'
          - 'nginx'
    ignore:
      # Skip non-LTS (odd-numbered) Node majors — only follow LTS line.
      - dependency-name: 'node'
        versions: ['25.x', '27.x', '29.x', '31.x']
